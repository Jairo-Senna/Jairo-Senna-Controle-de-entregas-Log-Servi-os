<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG SERVIÇOS - Controle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-default); transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        :root { --bg-body: #f7f9fb; --bg-card: #ffffff; --bg-input: #ffffff; --text-default: #1f2937; --text-secondary: #4b5563; }
        body.dark-mode { --bg-body: #111827; --bg-card: #1f2937; --bg-input: #374151; --text-default: #f9fafb; --text-secondary: #d1d5db; }
        .theme-card-bg { background-color: var(--bg-card) !important; color: var(--text-default) !important; }
        .theme-input { background-color: var(--bg-input) !important; color: var(--text-default) !important; border: 1px solid rgba(156,163,175,0.2) !important; }
        #menu-toggle-btn { background-color: #f97316; box-shadow: 0 4px 15px rgba(249, 115, 22, 0.4); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="theme-body-bg p-0">

    <!-- Botão Menu Lateral -->
    <button id="menu-toggle-btn" class="fixed top-4 left-4 z-40 p-3 text-white rounded-xl transition hover:scale-105 hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
    </button>
    
    <!-- Menu Lateral -->
    <div id="quinzena-history-menu" class="fixed top-0 left-0 w-80 bg-gray-900 text-white h-full z-50 transform -translate-x-full transition-transform duration-300 p-6 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-black text-orange-500 tracking-tighter">HISTÓRICO</h2>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Relatórios de Produção</p>
            </div>
            <button id="close-menu-btn" class="p-2 hover:bg-gray-800 rounded-full transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <div id="quinzena-summary-list" class="space-y-6 flex-grow overflow-y-auto pr-2 custom-scroll"></div>
        <div class="mt-4 pt-4 border-t border-gray-800 space-y-3">
            <button id="theme-toggle-btn" class="w-full py-3 bg-gray-800 rounded-2xl text-xs font-black uppercase tracking-widest">Mudar Tema</button>
            <button id="logout-btn" class="w-full py-3 text-red-500 hover:bg-red-500/10 rounded-2xl text-xs font-black uppercase tracking-widest transition">Sair</button>
        </div>
    </div>

    <div class="p-4 sm:p-8 max-w-4xl mx-auto">
        <!-- Tela de Login -->
        <div id="auth-container" class="max-w-md mx-auto mt-12 p-8 theme-card-bg rounded-[2.5rem] shadow-2xl border border-gray-100">
            <div class="text-center mb-8">
                <span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-3 inline-block">Controle de Entregas</span>
                <h1 class="text-4xl font-black tracking-tighter">LOG SERVIÇOS</h1>
            </div>
            <form id="email-auth-form" class="space-y-4">
                <input type="email" id="email" placeholder="E-mail" required class="w-full p-4 border rounded-2xl theme-input outline-none focus:ring-2 focus:ring-orange-500 font-medium">
                <input type="password" id="password" placeholder="Senha" required class="w-full p-4 border rounded-2xl theme-input outline-none focus:ring-2 focus:ring-orange-500 font-medium">
                <div class="flex items-center px-1">
                    <input type="checkbox" id="rememberMe" class="h-4 w-4 text-orange-600 rounded" checked>
                    <label for="rememberMe" class="ml-2 text-sm font-bold opacity-60">Manter conectado</label>
                </div>
                <button type="submit" id="sign-in-btn" class="w-full py-4 bg-orange-600 text-white font-black rounded-2xl uppercase shadow-lg hover:bg-orange-700 transition">Entrar</button>
                <button type="button" id="sign-up-btn" class="w-full py-2 text-blue-500 font-bold text-xs uppercase hover:underline">Criar Nova Conta</button>
                
                <div class="flex items-center my-4"><div class="flex-grow border-t opacity-10"></div><span class="px-3 text-[10px] font-bold opacity-30 uppercase">Ou use</span><div class="flex-grow border-t opacity-10"></div></div>
                
                <button type="button" id="google-btn" class="w-full py-3 bg-white border border-gray-200 text-gray-700 font-bold rounded-2xl shadow-sm flex items-center justify-center space-x-2 text-sm hover:bg-gray-50 transition">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                    <span>Google Login</span>
                </button>

                <p id="auth-error-display" class="text-center text-red-500 text-[10px] font-black mt-4 uppercase tracking-wider"></p>
            </form>
        </div>

        <!-- Dashboard Principal -->
        <div id="main-content" class="hidden">
            <header class="mb-6">
                <h1 class="text-4xl font-black tracking-tighter theme-label">🛵 Meus Ganhos</h1>
                <p id="user-info" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-1">---</p>
            </header>

            <!-- Card Resumo Mensal (Zera no dia 01) -->
            <div class="bg-gradient-to-br from-orange-500 to-orange-600 text-white p-8 rounded-[3rem] shadow-2xl mb-10 relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-[10px] font-black uppercase tracking-[0.3em] opacity-70 mb-2">Total do Mês Atual</h2>
                    <p id="total-net-accumulated" class="text-6xl font-black tracking-tighter">R$ 0,00</p>
                    <div class="mt-8 pt-6 border-t border-white/20 flex justify-between">
                        <div><p class="text-[9px] font-black uppercase opacity-60">Faturamento</p><p id="gross-total-summary" class="text-xl font-bold">R$ 0,00</p></div>
                        <div class="text-right"><p class="text-[9px] font-black uppercase opacity-60">Gasolina</p><p id="expense-total-summary" class="text-xl font-bold text-orange-200">R$ 0,00</p></div>
                    </div>
                </div>
                <div class="absolute -right-10 -bottom-10 opacity-10 rotate-12">
                    <svg width="250" height="250" viewBox="0 0 24 24" fill="white"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.97 4.44c-.31.17-.66.17-.97 0l-7.97-4.44c-.32-.17-.53-.5-.53-.88v-9c0-.38.21-.71.53-.88l7.97-4.44c.31-.17.66-.17.97 0l7.97 4.44c.32.17.53.5.53.88v9z"/></svg>
                </div>
            </div>

            <!-- Formulário de Lançamento -->
            <div id="form-card" class="theme-card-bg p-8 rounded-[3rem] shadow-xl border border-gray-100 mb-20">
                <div class="flex items-center space-x-3 mb-8">
                    <div class="w-2 h-8 bg-orange-500 rounded-full"></div>
                    <h2 class="text-2xl font-black tracking-tight">LANÇAR DIA</h2>
                </div>
                
                <form id="daily-entry-form" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-gray-400 px-1 tracking-widest">Data</label>
                        <input type="date" id="entryDate" required class="w-full p-5 border rounded-[1.5rem] theme-input font-black text-xl shadow-inner outline-none focus:ring-2 focus:ring-orange-500">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4" id="inputs-container"></div>
                    
                    <div class="p-6 bg-orange-50 dark:bg-orange-950/20 rounded-[2rem] flex justify-between items-center border border-orange-100 dark:border-orange-900/30">
                        <span class="text-[10px] font-black uppercase text-orange-600 tracking-widest">Bruto Estimado:</span>
                        <span id="daily-estimated-earning" class="text-3xl font-black text-orange-700 dark:text-orange-400 tracking-tighter">R$ 0,00</span>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-red-500 px-1 tracking-widest">Gasto com Gasolina (R$)</label>
                        <input type="number" id="dailyExpense" step="0.01" placeholder="0,00" class="w-full p-5 border rounded-[1.5rem] theme-input font-black text-2xl text-red-500 shadow-inner outline-none focus:ring-2 focus:ring-red-500">
                    </div>

                    <button type="submit" class="w-full py-6 bg-green-600 text-white font-black rounded-[2rem] shadow-2xl uppercase tracking-[0.2em] text-sm hover:bg-green-700 transition active:scale-95">
                        Salvar Lançamento
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const config = { apiKey: "AIzaSyDcc4VjTJfZlO7wY3r5ugpkJ3jxMqlCB9k", authDomain: "log-20.firebaseapp.com", projectId: "log-20", storageBucket: "log-20.firebasestorage.app", messagingSenderId: "1037378230673", appId: "1:1037378230673:web:e5cf864742139b47922230" };
        const PRICES = { flashCount: 1.7, flashExpressCount: 2.1, interlogCount: 1.5, interlogExpressCount: 2.0, mobiCount: 1.9, cartorioCount: 3.0, ecommerceCount: 3.0, loggiCount: 2.5, cartorioEnvelopeCount: 7.0 };
        const NAMES = { flashCount: 'Flash', flashExpressCount: 'Flash Exp', interlogCount: 'Interlog', interlogExpressCount: 'Interlog Exp', mobiCount: 'Mobi', cartorioCount: 'Cartório', ecommerceCount: 'Ecommerce', loggiCount: 'Loggi', cartorioEnvelopeCount: 'Envelope' };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const formatter = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

        // Gerar Inputs dinamicamente
        const inputs = document.getElementById('inputs-container');
        Object.keys(PRICES).forEach(k => {
            if(k === 'cartorioEnvelopeCount') return;
            inputs.innerHTML += `<div class="space-y-1"><label class="text-[9px] font-black uppercase text-gray-400 px-1">${NAMES[k]}</label><input type="number" id="${k}" placeholder="0" class="w-full p-4 border rounded-2xl theme-input font-black text-lg"></div>`;
        });
        document.getElementById('daily-entry-form').insertAdjacentHTML('beforeend', `<div class="space-y-1 mb-6"><label class="text-[9px] font-black uppercase text-gray-400 px-1">Envelope Cartório (7,00)</label><input type="number" id="cartorioEnvelopeCount" placeholder="0" class="w-full p-4 border rounded-2xl theme-input font-black text-lg"></div>`);

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('menu-toggle-btn').classList.remove('hidden');
                document.getElementById('user-info').textContent = user.email;
                sync(user.uid);
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        function sync(uid) {
            onSnapshot(query(collection(db, `artifacts/log-20/users/${uid}/daily_earnings`)), snap => {
                const entries = []; snap.forEach(d => entries.push({ date: d.id, ...d.data() }));
                render(entries);
            });
        }

        function render(entries) {
            const now = new Date();
            const currM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
            let mG = 0, mE = 0; const qMap = {};

            entries.forEach(e => {
                if(e.date.startsWith(currM)) { mG += e.totalEarnings || 0; mE += e.dailyExpense || 0; }
                const [y, m, d] = e.date.split('-');
                const qId = `${y}/${m} - ${parseInt(d) <= 15 ? '01-15' : '16-31'}`;
                if(!qMap[qId]) qMap[qId] = { id: qId, gross: 0, exp: 0, cats: {} };
                qMap[qId].gross += e.totalEarnings; qMap[qId].exp += (e.dailyExpense || 0);
                Object.keys(PRICES).forEach(k => qMap[qId].cats[k] = (qMap[qId].cats[k] || 0) + (e[k] || 0));
            });

            document.getElementById('total-net-accumulated').textContent = formatter.format(mG - mE);
            document.getElementById('gross-total-summary').textContent = formatter.format(mG);
            document.getElementById('expense-total-summary').textContent = formatter.format(mE);

            document.getElementById('quinzena-summary-list').innerHTML = Object.values(qMap).sort((a,b)=>b.id.localeCompare(a.id)).map(q => `
                <div class="bg-gray-800/80 rounded-[2.5rem] p-6 border border-white/5 shadow-2xl">
                    <div class="flex justify-between mb-5">
                        <div><p class="text-[8px] text-orange-500 font-black tracking-widest">PERÍODO</p><h3 class="text-xl font-black">${q.id}</h3></div>
                        <div class="text-right"><p class="text-[8px] text-green-500 font-black tracking-widest">LÍQUIDO</p><p class="text-xl font-black text-green-400">${formatter.format(q.gross - q.exp)}</p></div>
                    </div>
                    <div class="bg-black/20 rounded-2xl p-4 text-[10px] space-y-1">${Object.keys(PRICES).filter(k=>q.cats[k]>0).map(k=>`<div class="flex justify-between border-b border-white/5 pb-1"><span>${NAMES[k]}</span><span class="font-bold">${q.cats[k]} un.</span></div>`).join('')}</div>
                </div>`).join('');
        }

        const form = document.getElementById('daily-entry-form');
        form.addEventListener('input', () => {
            let t = 0; Object.keys(PRICES).forEach(k => t += (parseInt(document.getElementById(k).value) || 0) * PRICES[k]);
            document.getElementById('daily-estimated-earning').textContent = formatter.format(t);
        });

        form.onsubmit = async e => {
            e.preventDefault();
            const date = document.getElementById('entryDate').value;
            const data = { dailyExpense: parseFloat(document.getElementById('dailyExpense').value) || 0, totalEarnings: 0 };
            Object.keys(PRICES).forEach(k => { const v = parseInt(document.getElementById(k).value) || 0; data[k] = v; data.totalEarnings += v * PRICES[k]; });
            await setDoc(doc(db, `artifacts/log-20/users/${auth.currentUser.uid}/daily_earnings`, date), data);
            form.reset();
            document.getElementById('daily-estimated-earning').textContent = formatter.format(0);
        };

        // Handlers de Auth
        document.getElementById('email-auth-form').onsubmit = async e => {
            e.preventDefault();
            const remember = document.getElementById('rememberMe').checked;
            await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence);
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
                .catch(err => document.getElementById('auth-error-display').textContent = "ERRO: " + err.code);
        };

        document.getElementById('google-btn').onclick = async () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).catch(err => document.getElementById('auth-error-display').textContent = "ERRO GOOGLE: " + err.code);
        };

        document.getElementById('sign-up-btn').onclick = () => {
            createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
                .catch(err => document.getElementById('auth-error-display').textContent = "ERRO: " + err.code);
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);
        document.getElementById('menu-toggle-btn').onclick = () => document.getElementById('quinzena-history-menu').classList.remove('-translate-x-full');
        document.getElementById('close-menu-btn').onclick = () => document.getElementById('quinzena-history-menu').classList.add('-translate-x-full');
        document.getElementById('theme-toggle-btn').onclick = () => document.body.classList.toggle('dark-mode');
    </script>
</body>
</html>
